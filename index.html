        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');

        :root {
            --water-color-1: #006994;
            --water-color-2: #008ebf;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: #0f172a;
            color: white;
            overflow: hidden;
            touch-action: none; /* Mencegah pull-to-refresh di HP */
        }

        h1, h2, h3, .font-bold {
            font-family: 'Fredoka One', cursive;
        }

        /* Water Background Animation */
        .water-bg {
            background: linear-gradient(180deg, var(--water-color-1) 0%, var(--water-color-2) 100%);
            position: relative;
            overflow: hidden;
        }

        .water-bg::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.1) 0%, transparent 60%),
                radial-gradient(circle at 80% 20%, rgba(255,255,255,0.1) 0%, transparent 40%);
            background-size: 100px 100px;
            animation: waterDrift 10s linear infinite;
            pointer-events: none;
        }

        @keyframes waterDrift {
            0% { background-position: 0 0, 0 0; }
            100% { background-position: 100px 100px, -50px 100px; }
        }

        /* Leaf Animation */
        .leaf-float {
            animation: float 3s ease-in-out infinite;
        }
        .leaf-float:nth-child(even) {
            animation-duration: 4s;
            animation-direction: alternate-reverse;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-8px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(-1deg); }
        }

        /* Frog Idle Breathing */
        .frog-idle {
            transform-origin: bottom center;
            animation: breathe 1.5s ease-in-out infinite;
        }
        @keyframes breathe {
            0%, 100% { transform: scale(1, 1); }
            50% { transform: scale(1.05, 0.95); }
        }

        /* Splash Effect */
        .splash-ring {
            position: absolute;
            border: 4px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: ripple 0.8s ease-out forwards;
            pointer-events: none;
        }
        @keyframes ripple {
            0% { width: 0; height: 0; opacity: 1; border-width: 4px; }
            100% { width: 150px; height: 150px; opacity: 0; border-width: 0px; }
        }

        /* Sinking */
        .sink {
            animation: sinkDown 1s forwards ease-in;
        }
        @keyframes sinkDown {
            0% { transform: scale(1) rotate(0deg); opacity: 1; filter: brightness(1); }
            100% { transform: scale(0.5) translateY(100px) rotate(45deg); opacity: 0; filter: brightness(0.5); }
        }

        /* UI Transitions */
        .fade-enter { opacity: 0; transform: translateY(20px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: all 0.4s ease-out; }
        .fade-exit { opacity: 1; }
        .fade-exit-active { opacity: 0; transform: scale(0.9); transition: all 0.3s ease-in; }

        /* Custom Scrollbar for questions if needed */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }

        .btn-hover {
            transition: all 0.2s;
        }
        .btn-hover:active {
            transform: scale(0.95);
        }

        /* Grid Layouts */
        #game-container.mode-solo { grid-template-columns: 1fr; grid-template-rows: 1fr; }
        #game-container.mode-duel { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
        #game-container.mode-squad { grid-template-columns: 1fr 1fr 1fr 1fr; grid-template-rows: 1fr; }
        
        @media (max-width: 768px) {
            /* Override dihapus agar mode duel tetap berjejer kiri-kanan (kolom) di HP */
        }

        /* Leaf text responsive */
        .leaf-text {
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            line-height: 1.1;
        }

    </style>
</head>

/* ==========================================================================
   SISTEM AUDIO (Web Audio API Synthesizer)
   ========================================================================== */
let audioCtx;
let audioEnabled = true;

function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

function toggleAudio() {
    audioEnabled = !audioEnabled;
    document.getElementById('icon-audio-on').classList.toggle('hidden', !audioEnabled);
    document.getElementById('icon-audio-off').classList.toggle('hidden', audioEnabled);
}

function playSound(type) {
    if (!audioEnabled || !audioCtx) return;
    
    const osc = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();
    
    osc.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    
    const now = audioCtx.currentTime;
    
    if (type === 'jump') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(300, now);
        osc.frequency.exponentialRampToValueAtTime(600, now + 0.2);
        gainNode.gain.setValueAtTime(0.3, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.2);
        osc.start(now);
        osc.stop(now + 0.2);
    } else if (type === 'correct') {
        osc.type = 'square';
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.setValueAtTime(600, now + 0.1);
        gainNode.gain.setValueAtTime(0.2, now);
        gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.3);
    } else if (type === 'wrong') {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(50, now + 0.4);
        gainNode.gain.setValueAtTime(0.3, now);
        gainNode.gain.linearRampToValueAtTime(0, now + 0.4);
        osc.start(now);
        osc.stop(now + 0.4);
    } else if (type === 'tick') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(800, now);
        gainNode.gain.setValueAtTime(0.1, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
    } else if (type === 'splash') {
        // White noise for splash
        const bufferSize = audioCtx.sampleRate * 0.5; 
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) {
            data[i] = Math.random() * 2 - 1;
        }
        const noiseSource = audioCtx.createBufferSource();
        noiseSource.buffer = buffer;
        
        // Lowpass filter for water sound
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 1000;
        
        noiseSource.connect(filter);
        filter.connect(gainNode);
        
        gainNode.gain.setValueAtTime(0.5, now);
        gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        
        noiseSource.start(now);
        noiseSource.stop(now + 0.5);
    }
}

/* ==========================================================================
   EFEK VISUAL: HUJAN (Canvas)
   ========================================================================== */
const canvas = document.getElementById('rainCanvas');
const ctx = canvas.getContext('2d');
let raindrops = [];

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

class Raindrop {
    constructor() {
        this.reset();
        this.y = Math.random() * canvas.height; // Initial random y
    }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = -10;
        this.speed = Math.random() * 10 + 15;
        this.length = Math.random() * 20 + 10;
        this.opacity = Math.random() * 0.3 + 0.1;
    }
    update() {
        this.y += this.speed;
        this.x -= 2; // Slight wind angle
        if (this.y > canvas.height) this.reset();
    }
    draw() {
        ctx.beginPath();
        ctx.moveTo(this.x, this.y);
        ctx.lineTo(this.x - 2, this.y + this.length);
        ctx.strokeStyle = `rgba(255, 255, 255, ${this.opacity})`;
        ctx.lineWidth = 1;
        ctx.stroke();
    }
}

function initRain() {
    raindrops = [];
    for (let i = 0; i < 100; i++) {
        raindrops.push(new Raindrop());
    }
    animateRain();
}

function animateRain() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    raindrops.forEach(drop => {
        drop.update();
        drop.draw();
    });
    requestAnimationFrame(animateRain);
}

/* ==========================================================================
   LOGIKA GAME: Player & UI
   ========================================================================== */
const gameContainer = document.getElementById('game-container');
const mainMenu = document.getElementById('main-menu');
let players = [];
let gameInterval;

// Utils
function shuffleArray(array) {
    let curId = array.length;
    while (0 !== curId) {
        let randId = Math.floor(Math.random() * curId);
        curId -= 1;
        let tmp = array[curId];
        array[curId] = array[randId];
        array[randId] = tmp;
    }
    return array;
}

class Player {
    constructor(id, name, colors) {
        this.id = id;
        this.name = name;
        this.colors = colors;
        this.score = 0;
        this.combo = 0;
        this.isFinished = false;
        this.lives = 3;
        this.timeLeft = 25;
        this.timerInterval = null;
        this.currentQuestion = null;
        this.questions = shuffleArray([...questionBank]); // Clone & shuffle
        this.qIndex = 0;
        
        this.createDOM();
        this.nextQuestion();
    }

    createDOM() {
        const board = document.createElement('div');
        board.className = `player-board relative water-bg border-2 border-gray-800 flex flex-col items-center`;
        board.id = `player-${this.id}`;
        
        // Background overlay for distinct player colors
        const overlay = document.createElement('div');
        overlay.className = `absolute inset-0 ${this.colors.bg} opacity-30 pointer-events-none`;
        board.appendChild(overlay);

        const isSquadMode = gameContainer.classList.contains('mode-squad');

        // UI Header
        const header = document.createElement('div');
        header.className = `absolute top-12 lg:top-16 w-[95%] bg-white/90 text-gray-800 ${isSquadMode ? 'p-1.5' : 'p-3'} rounded-xl shadow-lg z-20 flex flex-col ${isSquadMode ? 'gap-0.5' : 'gap-2'}`;
        
        const topRow = document.createElement('div');
        topRow.className = `flex justify-between items-center font-bold ${isSquadMode ? 'text-[10px]' : 'text-sm lg:text-base'} w-full`;
        topRow.innerHTML = `
            <div class="flex flex-col items-start w-1/3">
                <span class="${this.colors.text}">${this.name}</span>
                <span id="lives-${this.id}" class="text-red-500 ${isSquadMode ? 'text-[8px]' : 'text-xs'} mt-0.5 tracking-widest">❤️❤️❤️</span>
            </div>
            <div class="flex flex-col items-center w-1/3">
                <span id="timer-${this.id}" class="${isSquadMode ? 'text-sm' : 'text-xl'} text-yellow-500 font-bold transition-colors">25</span>
            </div>
            <div class="flex flex-col items-end gap-1 w-1/3">
                <span>Skor: <span id="score-${this.id}" class="text-blue-600">0</span></span>
                <span id="combo-${this.id}" class="text-orange-500 ${isSquadMode ? 'text-[8px]' : 'text-xs'} hidden">Combo x1</span>
            </div>
        `;
        
        // Indikator nomor/sisa soal
        const qCounter = document.createElement('div');
        qCounter.id = `qcounter-${this.id}`;
        qCounter.className = `${isSquadMode ? 'text-[8px]' : 'text-[10px] lg:text-xs'} font-bold text-gray-400 text-center uppercase tracking-wider ${isSquadMode ? 'mt-0' : 'mt-1'}`;
        qCounter.innerText = `Soal - / -`;

        const qText = document.createElement('div');
        qText.id = `qtext-${this.id}`;
        qText.className = `${isSquadMode ? 'text-xs leading-tight' : 'text-sm lg:text-md leading-tight'} font-semibold text-center`;
        qText.innerText = "Loading question...";

        header.appendChild(topRow);
        header.appendChild(qCounter);
        header.appendChild(qText);
        board.appendChild(header);

        // Game Area (Leaves & Frog)
        const playArea = document.createElement('div');
        playArea.id = `playarea-${this.id}`;
        playArea.className = `absolute bottom-0 w-full h-[70%] lg:h-[75%] z-10`;
        board.appendChild(playArea);

        // Awan yang tersebar di bawah (Tidak ikut melompat)
        const cloudsContainer = document.createElement('div');
        cloudsContainer.className = `absolute bottom-0 w-full h-[20%] pointer-events-none flex justify-around items-end pb-2 opacity-90 z-[15]`;
        for(let i = 0; i < 3; i++) {
            const cloud = document.createElement('div');
            // Variasikan ukuran dan beri efek mengambang pelan (leaf-float)
            const sizeClass = i === 1 ? 'w-24 lg:w-32 mb-4' : 'w-16 lg:w-24 mb-0';
            cloud.className = `${sizeClass} leaf-float`;
            cloud.innerHTML = document.getElementById('svg-cloud').outerHTML;
            cloudsContainer.appendChild(cloud);
        }
        playArea.appendChild(cloudsContainer);

        // Frog / Merpati
        const frog = document.createElement('div');
        frog.id = `frog-${this.id}`;
        frog.className = `absolute w-12 h-12 lg:w-16 lg:h-16 -ml-6 lg:-ml-8 z-30 transition-all duration-500`;
        frog.innerHTML = document.getElementById('svg-frog').outerHTML;
        // Initial pos: center bottom
        frog.style.left = `50%`;
        frog.style.bottom = `10%`;
        playArea.appendChild(frog);

        // Game Over Overlay
        const gameOverScreen = document.createElement('div');
        gameOverScreen.id = `gameover-${this.id}`;
        gameOverScreen.className = `absolute inset-0 bg-black/70 z-40 hidden flex-col items-center justify-center p-4 text-center`;
        gameOverScreen.innerHTML = `
            <h3 class="text-3xl text-red-500 mb-2">JATUH!</h3>
            <p class="text-xl text-white mb-4">Skor Akhir: <span id="final-score-${this.id}">0</span></p>
        `;
        
        // Only show restart button in Solo mode, otherwise wait for everyone
        if (players.length === 0 || gameContainer.classList.contains('mode-solo')) {
            gameOverScreen.innerHTML += `<button onclick="returnToMenu()" class="mt-4 bg-gray-200 text-gray-900 px-4 py-2 rounded-lg font-bold hover:bg-white">Menu Utama</button>`;
        }
        board.appendChild(gameOverScreen);

        gameContainer.appendChild(board);
        this.board = board;
        this.playArea = playArea;
        this.frog = frog;
    }

    nextQuestion() {
        if (this.isFinished) return;

        // Jika pertanyaan sudah habis, selesaikan game untuk pemain ini
        if (this.qIndex >= this.questions.length) {
            this.isFinished = true;
            this.showGameOver();
            checkGlobalGameOver();
            return;
        }

        this.currentQuestion = this.questions[this.qIndex];
        this.qIndex++;

        // Update Text Soal & Sisa Soal
        document.getElementById(`qcounter-${this.id}`).innerText = `Soal ${this.qIndex} dari ${this.questions.length}`;
        document.getElementById(`qtext-${this.id}`).innerText = this.currentQuestion.q;

        // Prepare Answers (Shuffle options but keep track of correct)
        let optionsWithCorrect = this.currentQuestion.options.map((opt, i) => ({
            text: opt,
            isCorrect: i === this.currentQuestion.correct
        }));
        optionsWithCorrect = shuffleArray(optionsWithCorrect);

        this.spawnLeaves(optionsWithCorrect);
        this.startTimer();
    }

    startTimer() {
        this.clearTimer();
        this.timeLeft = 25;
        this.updateTimerUI();
        
        this.timerInterval = setInterval(() => {
            if (this.isFinished) return this.clearTimer();
            
            this.timeLeft--;
            this.updateTimerUI();
            
            if (this.timeLeft <= 5 && this.timeLeft > 0) {
                playSound('tick');
            } else if (this.timeLeft <= 0) {
                this.clearTimer();
                this.handleWrong(null); // Waktu habis dianggap salah
            }
        }, 1000);
    }

    clearTimer() {
        if (this.timerInterval) {
            clearInterval(this.timerInterval);
            this.timerInterval = null;
        }
    }

    updateTimerUI() {
        const timerEl = document.getElementById(`timer-${this.id}`);
        if (timerEl) {
            timerEl.innerText = this.timeLeft;
            if (this.timeLeft <= 5) {
                timerEl.classList.remove('text-yellow-500');
                timerEl.classList.add('text-red-500', 'animate-pulse');
            } else {
                timerEl.classList.add('text-yellow-500');
                timerEl.classList.remove('text-red-500', 'animate-pulse');
            }
        }
    }

    updateLivesUI() {
        const livesEl = document.getElementById(`lives-${this.id}`);
        if(livesEl) {
            livesEl.innerText = '❤️'.repeat(this.lives) + '🖤'.repeat(3 - this.lives);
        }
    }

    spawnLeaves(options) {
        // Remove old leaves
        const oldLeaves = this.playArea.querySelectorAll('.leaf-btn');
        oldLeaves.forEach(l => {
            l.style.opacity = '0';
            l.style.bottom = '-20%';
            setTimeout(() => l.remove(), 500);
        });

        // Calculate positions (Staggered arc)
        // Jika Squad Mode (4 pemain), turunkan daun dan dekatkan ke tengah agar mudah dibaca di layar sempit
        const isSquadMode = gameContainer.classList.contains('mode-squad');
        const isSoloMode = gameContainer.classList.contains('mode-solo');
        const isDuelMode = gameContainer.classList.contains('mode-duel');

        const positions = isSquadMode ? [
            { x: 20, y: 40 }, // Kiri atas (diturunkan drastis)
            { x: 35, y: 20 }, // Kiri bawah (diturunkan drastis)
            { x: 50, y: 50 }, // Tengah atas (diturunkan drastis)
            { x: 65, y: 20 }, // Kanan bawah (diturunkan drastis)
            { x: 80, y: 40 }  // Kanan atas (diturunkan drastis)
        ] : [
            { x: 15, y: 45 }, // Kiri atas (diturunkan jauh dari soal)
            { x: 30, y: 25 }, // Kiri bawah (diturunkan jauh dari soal)
            { x: 50, y: 55 }, // Tengah atas (diturunkan jauh dari soal)
            { x: 70, y: 25 }, // Kanan bawah (diturunkan jauh dari soal)
            { x: 85, y: 45 }  // Kanan atas (diturunkan jauh dari soal)
        ];

        // Perbesar daun & teks sesuai Mode permainan
        let leafSizeClasses = 'w-20 h-20 lg:w-28 lg:h-28 -ml-10 lg:-ml-14'; // Default (Squad Mode)
        let textSizeClasses = 'text-[10px] lg:text-sm';

        if (isSoloMode) {
            leafSizeClasses = 'w-28 h-28 lg:w-40 lg:h-40 -ml-14 lg:-ml-20';
            textSizeClasses = 'text-xs lg:text-base';
        } else if (isDuelMode) {
            // Ukuran ditengah-tengah antara Solo dan Squad agar pas di layar bagi 2
            leafSizeClasses = 'w-24 h-24 lg:w-32 lg:h-32 -ml-12 lg:-ml-16';
            textSizeClasses = 'text-[11px] lg:text-[15px]';
        }

        options.forEach((opt, index) => {
            const leaf = document.createElement('div');
            leaf.className = `leaf-btn leaf-float absolute ${leafSizeClasses} flex items-center justify-center cursor-pointer transition-transform hover:scale-110 z-20`;
            leaf.dataset.correct = opt.isCorrect; // Menyimpan data jawaban benar pada daun
            leaf.innerHTML = document.getElementById('svg-leaf').outerHTML;
            
            // Text container inside leaf
            const textSpan = document.createElement('span');
            textSpan.className = `absolute leaf-text ${textSizeClasses} font-bold text-white text-center w-[80%] pointer-events-none break-words`;
            textSpan.innerText = opt.text;
            leaf.appendChild(textSpan);

            // Positioning (Sudah ditengahkan dengan margin-left)
            leaf.style.left = `${positions[index].x}%`;
            leaf.style.bottom = `100%`; // Start from above
            
            // Animation drop in
            setTimeout(() => {
                leaf.style.transition = 'bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                leaf.style.bottom = `${positions[index].y}%`;
            }, 50);

            // Interaction
            leaf.onclick = () => this.jumpTo(leaf, opt.isCorrect, positions[index]);
            
            this.playArea.appendChild(leaf);
        });
    }

    jumpTo(leafEl, isCorrect, targetPos) {
        if (this.isFinished) return;
        
        this.clearTimer();
        playSound('jump');
        
        // Disable other leaves
        const leaves = this.playArea.querySelectorAll('.leaf-btn');
        leaves.forEach(l => l.style.pointerEvents = 'none');

        // Animate Frog Jump
        const frogRect = this.frog.getBoundingClientRect();
        const leafRect = leafEl.getBoundingClientRect();
        const playAreaRect = this.playArea.getBoundingClientRect();

        const targetX = targetPos.x;
        const targetY = targetPos.y;

        // Use Web Animations API for Arc
        this.frog.animate([
            { transform: 'translate(0, 0) scale(1)' },
            { transform: `translate(0, -50px) scale(1.2)` }, // Peak
            { transform: 'translate(0, 0) scale(1)' }
        ], { duration: 400, easing: 'ease-in-out' });

        this.frog.style.left = `${targetX}%`;
        this.frog.style.bottom = `calc(${targetY}% + 10px)`; // land slightly above center

        setTimeout(() => {
            if (isCorrect) {
                this.handleCorrect(leafEl);
            } else {
                this.handleWrong(leafEl);
            }
        }, 400); // Wait for jump animation
    }

    handleCorrect(leafEl) {
        playSound('correct');
        this.score += 10 + (this.combo * 5);
        this.combo++;
        
        document.getElementById(`score-${this.id}`).innerText = this.score;
        const comboEl = document.getElementById(`combo-${this.id}`);
        if (this.combo > 1) {
            comboEl.innerText = `Combo x${this.combo}`;
            comboEl.classList.remove('hidden');
            comboEl.classList.add('scale-125', 'text-yellow-400');
            setTimeout(() => comboEl.classList.remove('scale-125', 'text-yellow-400'), 300);
        }

        // Visual feedback on leaf
        leafEl.querySelector('svg').style.filter = 'brightness(1.5)';

        // Scroll effect: move frog back to bottom, spawn new leaves
        setTimeout(() => {
            this.frog.style.bottom = `10%`;
            this.frog.style.left = `50%`;
            this.nextQuestion();
        }, 500);
    }

    handleWrong(leafEl) {
        this.combo = 0;
        this.lives--;
        this.updateLivesUI();

        playSound('wrong');
        setTimeout(() => playSound('splash'), 200);

        // Frog sink animation
        this.frog.classList.add('sink');
        
        // Leaf break/sink animation (jika melompat ke daun yang salah)
        if (leafEl) {
            leafEl.style.transform = 'translateY(50px) rotate(20deg)';
            leafEl.style.opacity = '0';
        }

        // --- Tampilkan jawaban yang benar ---
        const correctLeaf = this.playArea.querySelector('[data-correct="true"]');
        if (correctLeaf) {
            correctLeaf.style.transform = 'scale(1.2)';
            correctLeaf.style.zIndex = '40';
            
            // Beri efek bersinar pada daun yang benar
            const svgEl = correctLeaf.querySelector('svg');
            if (svgEl) svgEl.style.filter = 'drop-shadow(0 0 15px #fbbf24) brightness(1.4)';
            
            // Ubah warna teks daun yang benar menjadi kuning
            const textEl = correctLeaf.querySelector('.leaf-text');
            if (textEl) textEl.style.color = '#fde047'; 
            
            // Redupkan daun lain agar jawaban benar lebih menonjol
            const allLeaves = this.playArea.querySelectorAll('.leaf-btn');
            allLeaves.forEach(l => {
                if (l !== correctLeaf && l !== leafEl) {
                    l.style.opacity = '0.3';
                }
            });
        }
        // ------------------------------------

        // Create Splash Ring
        const splash = document.createElement('div');
        splash.className = 'splash-ring';
        // Position relative to play area
        splash.style.left = this.frog.style.left;
        splash.style.bottom = this.frog.style.bottom;
        this.playArea.appendChild(splash);

        // Cek sisa nyawa, jika habis game over, jika sisa respawn
        setTimeout(() => {
            if (this.lives <= 0) {
                this.isFinished = true;
                this.showGameOver();
                checkGlobalGameOver();
            } else {
                this.frog.classList.remove('sink');
                this.frog.style.bottom = `10%`;
                this.frog.style.left = `50%`;
                this.nextQuestion();
            }
        }, 2500); // Diperlama menjadi 2.5 detik agar pemain sempat membaca jawaban
    }

    showGameOver() {
        const goScreen = document.getElementById(`gameover-${this.id}`);
        goScreen.classList.remove('hidden');
        goScreen.classList.add('flex');
        
        const title = goScreen.querySelector('h3');
        title.innerText = "SELESAI!";
        title.className = "text-3xl text-yellow-400 mb-2 font-bold";
        
        document.getElementById(`final-score-${this.id}`).innerText = this.score;
    }
}

/* ==========================================================================
   GAME MANAGEMENT
   ========================================================================== */
function startGame(mode) {
    initAudio();
    mainMenu.classList.add('opacity-0', 'pointer-events-none');
    setTimeout(() => mainMenu.classList.add('hidden'), 500);

    document.getElementById('btn-home').classList.remove('hidden');

    gameContainer.innerHTML = '';
    gameContainer.classList.remove('hidden', 'mode-solo', 'mode-duel', 'mode-squad');
    players = [];

    const colors = [
        { bg: 'bg-transparent', text: 'text-green-600' }, // Solo uses default
        { bg: 'bg-red-500', text: 'text-red-700' },
        { bg: 'bg-blue-500', text: 'text-blue-700' },
        { bg: 'bg-yellow-500', text: 'text-yellow-700' },
        { bg: 'bg-purple-500', text: 'text-purple-700' }
    ];

    if (mode === 1) {
        gameContainer.classList.add('mode-solo');
        players.push(new Player(1, "Player 1", colors[0]));
    } else if (mode === 2) {
        gameContainer.classList.add('mode-duel');
        players.push(new Player(1, "Player 1", colors[1]));
        players.push(new Player(2, "Player 2", colors[2]));
    } else if (mode === 4) {
        gameContainer.classList.add('mode-squad');
        players.push(new Player(1, "P1", colors[1]));
        players.push(new Player(2, "P2", colors[2]));
        players.push(new Player(3, "P3", colors[3]));
        players.push(new Player(4, "P4", colors[4]));
    }

    initRain();
}

function checkGlobalGameOver() {
    const allFinished = players.every(p => p.isFinished);
    if (allFinished && players.length > 1) {
        // Find winner
        let maxScore = -1;
        let winnerName = "";
        players.forEach(p => {
            if (p.score > maxScore) {
                maxScore = p.score;
                winnerName = p.name;
            }
        });

        // Append global result screen
        const resultScreen = document.createElement('div');
        resultScreen.className = `absolute inset-0 bg-black/90 z-50 flex flex-col items-center justify-center p-8 text-center fade-enter-active`;
        resultScreen.innerHTML = `
            <h2 class="text-5xl text-yellow-400 mb-6 font-bold">GAME OVER</h2>
            <p class="text-2xl text-white mb-2">Pemenang: <span class="text-green-400 font-bold">${winnerName}</span></p>
            <p class="text-xl text-gray-300 mb-8">Skor Tertinggi: ${maxScore}</p>
            <button onclick="returnToMenu()" class="bg-green-500 text-white px-8 py-3 rounded-xl font-bold text-xl hover:bg-green-600 btn-hover">Main Lagi</button>
        `;
        document.body.appendChild(resultScreen);
    }
}

function returnToMenu() {
    players.forEach(p => p.clearTimer());

    // Remove result screen if exists
    const resultScreen = document.querySelector('.z-50.bg-black\\/90');
    if (resultScreen) resultScreen.remove();

    document.getElementById('btn-home').classList.add('hidden');

    gameContainer.classList.add('hidden');
    gameContainer.innerHTML = '';
    mainMenu.classList.remove('hidden', 'opacity-0');
    mainMenu.classList.add('opacity-100');
    mainMenu.classList.remove('pointer-events-none');
}

function toggleFullScreen() {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(err => {
            console.log(`Error attempting to enable full-screen mode: ${err.message} (${err.name})`);
        });
    } else {
        if (document.exitFullscreen) {
            document.exitFullscreen();
        }
    }
}
